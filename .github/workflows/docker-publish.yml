# Docker Hub Publishing Workflow for GenMaster and GenSlave
#
# This workflow builds and publishes multi-architecture Docker images to Docker Hub.
#
# Images:
# - GenMaster: rjsears/genmaster (amd64, arm64)
# - GenSlave: rjsears/pizero_generator_control:genslave (arm/v6 for Pi Zero)
#
# Triggers:
# - Push to main (genmaster/** or genslave/** paths)
# - Manual workflow dispatch
#
# Required Secrets:
# - DOCKERHUB_USERNAME: Docker Hub username
# - DOCKERHUB_TOKEN: Docker Hub access token

name: Build and Publish Docker Images

on:
  push:
    branches:
      - main
    tags:
      - 'v*.*.*'
    paths:
      - 'genmaster/**'
      - 'genslave/**'
      - '.github/workflows/docker-publish.yml'
  workflow_dispatch:
    inputs:
      target:
        description: 'Which image to build'
        required: true
        default: 'both'
        type: choice
        options:
          - both
          - genmaster
          - genslave
      tag:
        description: 'Tag to build (e.g., v1.0.0 or latest)'
        required: false
        default: 'latest'

env:
  REGISTRY: docker.io

jobs:
  # ==========================================================================
  # Determine which images to build based on changed files
  # ==========================================================================
  changes:
    runs-on: ubuntu-latest
    outputs:
      genmaster: ${{ steps.filter.outputs.genmaster }}
      genslave: ${{ steps.filter.outputs.genslave }}
    steps:
      - uses: actions/checkout@v4
      - uses: dorny/paths-filter@v3
        id: filter
        with:
          filters: |
            genmaster:
              - 'genmaster/**'
              - '.github/workflows/docker-publish.yml'
            genslave:
              - 'genslave/**'
              - '.github/workflows/docker-publish.yml'

  # ==========================================================================
  # Build and Push GenMaster (amd64, arm64)
  # ==========================================================================
  build-genmaster:
    needs: changes
    if: |
      needs.changes.outputs.genmaster == 'true' ||
      github.event_name == 'workflow_dispatch' && (github.event.inputs.target == 'both' || github.event.inputs.target == 'genmaster')
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write
    env:
      IMAGE_NAME: rjsears/genmaster

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up QEMU
        uses: docker/setup-qemu-action@v3
        with:
          platforms: linux/amd64,linux/arm64

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to Docker Hub
        if: github.event_name != 'pull_request'
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      - name: Extract Docker metadata
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ${{ env.REGISTRY }}/rjsears/genmaster
          tags: |
            # Set 'latest' tag for main branch
            type=raw,value=latest,enable=${{ github.ref == 'refs/heads/main' }}
            # Use version tag if pushing a tag
            type=semver,pattern={{version}}
            type=semver,pattern={{major}}.{{minor}}
            type=semver,pattern={{major}}
            # Use manual input if workflow_dispatch
            type=raw,value=${{ github.event.inputs.tag }},enable=${{ github.event_name == 'workflow_dispatch' }}
            # Add git SHA for traceability
            type=sha,prefix=sha-
          labels: |
            org.opencontainers.image.title=GenMaster
            org.opencontainers.image.description=Generator Control System - Master Controller
            org.opencontainers.image.vendor=rjsears
            maintainer=rjsears

      - name: Build and push Docker image
        uses: docker/build-push-action@v5
        with:
          context: ./genmaster
          file: ./genmaster/Dockerfile
          platforms: linux/amd64,linux/arm64
          push: ${{ github.event_name != 'pull_request' }}
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          cache-from: type=gha
          cache-to: type=gha,mode=max
          build-args: |
            BUILD_DATE=${{ github.event.head_commit.timestamp }}
            VCS_REF=${{ github.sha }}
            VERSION=${{ steps.meta.outputs.version }}

      - name: Update Docker Hub Description
        if: github.event_name != 'pull_request' && github.ref == 'refs/heads/main'
        uses: peter-evans/dockerhub-description@v4
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}
          repository: ${{ env.IMAGE_NAME }}
          short-description: "Generator Control System - Master Controller for Raspberry Pi"
          readme-filepath: ./genmaster/README.md

      - name: Image digest
        if: github.event_name != 'pull_request'
        run: echo "Image pushed with digest ${{ steps.meta.outputs.digest }}"

  # ==========================================================================
  # Security Scanning for GenMaster
  # ==========================================================================
  security-scan-genmaster:
    needs: build-genmaster
    runs-on: ubuntu-latest
    if: github.event_name != 'pull_request' && needs.build-genmaster.result == 'success'

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Run Trivy vulnerability scanner
        uses: aquasecurity/trivy-action@master
        with:
          image-ref: ${{ env.REGISTRY }}/rjsears/genmaster:latest
          format: 'sarif'
          output: 'trivy-results-genmaster.sarif'
          severity: 'CRITICAL,HIGH'

      - name: Upload Trivy scan results to GitHub Security tab
        uses: github/codeql-action/upload-sarif@v3
        if: always()
        with:
          sarif_file: 'trivy-results-genmaster.sarif'

  # ==========================================================================
  # Build and Push GenSlave (arm/v6 for Pi Zero)
  # ==========================================================================
  build-genslave:
    needs: changes
    if: |
      needs.changes.outputs.genslave == 'true' ||
      github.event_name == 'workflow_dispatch' && (github.event.inputs.target == 'both' || github.event.inputs.target == 'genslave')
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up QEMU
        uses: docker/setup-qemu-action@v3
        with:
          platforms: linux/arm/v6,linux/arm/v7,linux/arm64

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to Docker Hub
        if: github.event_name != 'pull_request'
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      - name: Extract Docker metadata
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ${{ env.REGISTRY }}/rjsears/pizero_generator_control
          tags: |
            # Always use 'genslave' tag
            type=raw,value=genslave,enable=true
            # Add version tag if pushing a tag
            type=raw,value=genslave-${{ github.ref_name }},enable=${{ startsWith(github.ref, 'refs/tags/v') }}
            # Add git SHA for traceability
            type=sha,prefix=genslave-sha-
          labels: |
            org.opencontainers.image.title=GenSlave
            org.opencontainers.image.description=Generator Control System - Slave Relay Controller for Pi Zero
            org.opencontainers.image.vendor=rjsears
            maintainer=rjsears

      - name: Build and push Docker image
        uses: docker/build-push-action@v5
        with:
          context: ./genslave
          file: ./genslave/Dockerfile
          platforms: linux/arm/v6
          push: ${{ github.event_name != 'pull_request' }}
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          cache-from: type=gha
          cache-to: type=gha,mode=max
          build-args: |
            BUILD_DATE=${{ github.event.head_commit.timestamp }}
            VCS_REF=${{ github.sha }}

      - name: Image digest
        if: github.event_name != 'pull_request'
        run: echo "Image pushed with digest ${{ steps.meta.outputs.digest }}"

  # ==========================================================================
  # Security Scanning for GenSlave
  # ==========================================================================
  security-scan-genslave:
    needs: build-genslave
    runs-on: ubuntu-latest
    if: github.event_name != 'pull_request' && needs.build-genslave.result == 'success'

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Run Trivy vulnerability scanner
        uses: aquasecurity/trivy-action@master
        with:
          image-ref: ${{ env.REGISTRY }}/rjsears/pizero_generator_control:genslave
          format: 'sarif'
          output: 'trivy-results-genslave.sarif'
          severity: 'CRITICAL,HIGH'

      - name: Upload Trivy scan results to GitHub Security tab
        uses: github/codeql-action/upload-sarif@v3
        if: always()
        with:
          sarif_file: 'trivy-results-genslave.sarif'
