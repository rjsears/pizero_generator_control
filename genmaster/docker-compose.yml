# GenMaster Docker Compose Configuration
#
# Usage:
#   Production:         docker compose up -d
#   With Tailscale:     docker compose --profile tailscale up -d
#   With Cloudflare:    docker compose --profile cloudflare up -d
#   Full stack:         docker compose --profile tailscale --profile cloudflare up -d
#   Development:        docker compose --profile dev up -d
#
# Environment:
#   Copy .env.example to .env and configure before starting

version: '3.8'

services:
  # ==========================================================================
  # GenMaster Application
  # ==========================================================================
  genmaster:
    image: rjsears/genmaster:${GENMASTER_VERSION:-latest}
    container_name: genmaster
    restart: unless-stopped
    depends_on:
      db:
        condition: service_healthy
    environment:
      - APP_ENV=${APP_ENV:-production}
      - APP_DEBUG=${APP_DEBUG:-false}
      - APP_SECRET_KEY=${APP_SECRET_KEY}
      - DATABASE_HOST=db
      - DATABASE_PORT=5432
      - DATABASE_USER=${DATABASE_USER:-genmaster}
      - DATABASE_PASSWORD=${DATABASE_PASSWORD}
      - DATABASE_NAME=${DATABASE_NAME:-genmaster}
      - SLAVE_API_URL=${SLAVE_API_URL:-http://genslave:8000}
      - SLAVE_API_SECRET=${SLAVE_API_SECRET}
      - WEBHOOK_BASE_URL=${WEBHOOK_BASE_URL}
      - WEBHOOK_SECRET=${WEBHOOK_SECRET}
      - HEARTBEAT_INTERVAL_SECONDS=${HEARTBEAT_INTERVAL_SECONDS:-60}
      - HEARTBEAT_FAILURE_THRESHOLD=${HEARTBEAT_FAILURE_THRESHOLD:-3}
      - LOG_LEVEL=${LOG_LEVEL:-INFO}
    volumes:
      - genmaster_logs:/app/logs
      - genmaster_data:/app/data
      # GPIO access for Pi 5 (uses /dev/gpiochip* instead of /dev/gpiomem)
      - /dev/gpiomem:/dev/gpiomem:ro
    devices:
      # GPIO device access for Raspberry Pi 5
      # Pi 5 uses gpiochip0 for RP1 GPIO controller (pins 0-27)
      # gpiochip4 is for the legacy GPIO interface
      - /dev/gpiochip0:/dev/gpiochip0
      - /dev/gpiochip4:/dev/gpiochip4
    group_add:
      - gpio
      - dialout
    networks:
      - genmaster-internal
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8000/api/health"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 10s

  # ==========================================================================
  # PostgreSQL Database
  # ==========================================================================
  db:
    image: postgres:16-alpine
    container_name: genmaster-db
    restart: unless-stopped
    environment:
      - POSTGRES_USER=${DATABASE_USER:-genmaster}
      - POSTGRES_PASSWORD=${DATABASE_PASSWORD}
      - POSTGRES_DB=${DATABASE_NAME:-genmaster}
      - PGDATA=/var/lib/postgresql/data/pgdata
    volumes:
      - postgres_data:/var/lib/postgresql/data
    # PostgreSQL performance tuning for Pi 5 with 8GB RAM
    command: >
      postgres
      -c shared_buffers=512MB
      -c effective_cache_size=2GB
      -c maintenance_work_mem=256MB
      -c checkpoint_completion_target=0.9
      -c wal_buffers=16MB
      -c default_statistics_target=100
      -c random_page_cost=1.1
      -c effective_io_concurrency=200
      -c work_mem=10MB
      -c min_wal_size=1GB
      -c max_wal_size=4GB
      -c max_worker_processes=4
      -c max_parallel_workers_per_gather=2
      -c max_parallel_workers=4
      -c max_parallel_maintenance_workers=2
    networks:
      - genmaster-internal
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${DATABASE_USER:-genmaster} -d ${DATABASE_NAME:-genmaster}"]
      interval: 10s
      timeout: 5s
      retries: 5

  # ==========================================================================
  # Nginx Reverse Proxy
  # ==========================================================================
  nginx:
    image: nginx:alpine
    container_name: genmaster-nginx
    restart: unless-stopped
    depends_on:
      genmaster:
        condition: service_healthy
    ports:
      - "${HTTP_PORT:-80}:80"
      - "${HTTPS_PORT:-443}:443"
    volumes:
      - ./nginx/nginx.conf:/etc/nginx/nginx.conf:ro
      - ./nginx/conf.d:/etc/nginx/conf.d:ro
      - nginx_cache:/var/cache/nginx
      # SSL certificates (mounted by setup.sh)
      - ${SSL_CERT_PATH:-./nginx/ssl}:/etc/nginx/ssl:ro
    networks:
      - genmaster-internal
    healthcheck:
      test: ["CMD", "wget", "-q", "--spider", "http://localhost/health"]
      interval: 30s
      timeout: 10s
      retries: 3

  # ==========================================================================
  # Tailscale VPN (Optional - use --profile tailscale)
  # ==========================================================================
  tailscale:
    image: tailscale/tailscale:latest
    container_name: genmaster-tailscale
    hostname: genmaster
    restart: unless-stopped
    profiles:
      - tailscale
    environment:
      - TS_AUTHKEY=${TAILSCALE_AUTHKEY}
      - TS_STATE_DIR=/var/lib/tailscale
      - TS_USERSPACE=false
      - TS_EXTRA_ARGS=${TAILSCALE_EXTRA_ARGS:---advertise-tags=tag:generator}
    volumes:
      - tailscale_state:/var/lib/tailscale
      - /dev/net/tun:/dev/net/tun
    cap_add:
      - NET_ADMIN
      - NET_RAW
    network_mode: host

  # ==========================================================================
  # Cloudflare Tunnel (Optional - use --profile cloudflare)
  # ==========================================================================
  cloudflared:
    image: cloudflare/cloudflared:latest
    container_name: genmaster-cloudflared
    restart: unless-stopped
    profiles:
      - cloudflare
    command: tunnel --no-autoupdate run
    environment:
      - TUNNEL_TOKEN=${CLOUDFLARE_TUNNEL_TOKEN}
    network_mode: host

  # ==========================================================================
  # Development Mode (Optional - use --profile dev)
  # ==========================================================================
  genmaster-dev:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: genmaster-dev
    restart: "no"
    profiles:
      - dev
    depends_on:
      db:
        condition: service_healthy
    environment:
      - APP_ENV=development
      - APP_DEBUG=true
      - APP_SECRET_KEY=dev-secret-key-not-for-production
      - DATABASE_HOST=db
      - DATABASE_PORT=5432
      - DATABASE_USER=${DATABASE_USER:-genmaster}
      - DATABASE_PASSWORD=${DATABASE_PASSWORD:-genmaster}
      - DATABASE_NAME=${DATABASE_NAME:-genmaster}
      - SLAVE_API_URL=${SLAVE_API_URL:-http://genslave:8000}
      - SLAVE_API_SECRET=${SLAVE_API_SECRET:-dev-secret}
      - LOG_LEVEL=DEBUG
    volumes:
      - ./backend/app:/app/app:ro
      - ./frontend/dist:/app/static:ro
      - genmaster_logs:/app/logs
    ports:
      - "8000:8000"
    networks:
      - genmaster-internal
    command: uvicorn app.main:app --host 0.0.0.0 --port 8000 --reload

# ==========================================================================
# Networks
# ==========================================================================
networks:
  genmaster-internal:
    driver: bridge
    ipam:
      config:
        - subnet: 172.28.0.0/16

# ==========================================================================
# Volumes
# ==========================================================================
volumes:
  postgres_data:
    driver: local
  genmaster_logs:
    driver: local
  genmaster_data:
    driver: local
  nginx_cache:
    driver: local
  tailscale_state:
    driver: local
